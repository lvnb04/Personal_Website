<svg xmlns="http://www.w3.org/2000/svg" width="860" height="320" viewBox="0 0 860 320" fill="none">
  <rect width="860" height="320" fill="#0b0e14"/>
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7c8cff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- orchestration band -->
  <rect x="24" y="40" width="812" height="44" rx="8" fill="url(#band)" stroke="#4a57c9" stroke-width="1"/>
  <text x="430" y="68" font-family="ui-monospace, monospace" font-size="15" fill="#a8b1ff" text-anchor="middle">orchestration layer — turn-taking · interruptions · latency</text>

  <!-- pipeline boxes -->
  <g font-family="ui-monospace, monospace" font-size="13" fill="#c9d1d9" text-anchor="middle">
    <g>
      <rect x="24"  y="150" width="96" height="44" rx="6" fill="#141a26" stroke="#30363d"/>
      <text x="72" y="177">mic</text>
    </g>
    <g>
      <rect x="148" y="150" width="96" height="44" rx="6" fill="#141a26" stroke="#30363d"/>
      <text x="196" y="177">capture</text>
    </g>
    <g>
      <rect x="272" y="150" width="96" height="44" rx="6" fill="#141a26" stroke="#30363d"/>
      <text x="320" y="177">VAD</text>
    </g>
    <g>
      <rect x="396" y="150" width="96" height="44" rx="6" fill="#141a26" stroke="#30363d"/>
      <text x="444" y="177">STT</text>
    </g>
    <g>
      <rect x="520" y="150" width="96" height="44" rx="6" fill="#141a26" stroke="#30363d"/>
      <text x="568" y="177">LLM</text>
    </g>
    <g>
      <rect x="644" y="150" width="96" height="44" rx="6" fill="#141a26" stroke="#30363d"/>
      <text x="692" y="177">TTS</text>
    </g>
    <g>
      <rect x="768" y="150" width="68" height="44" rx="6" fill="#141a26" stroke="#30363d"/>
      <text x="802" y="177">play</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="#4a5570" stroke-width="1.5" marker-end="url(#arrow)">
    <line x1="120" y1="172" x2="146" y2="172"/>
    <line x1="244" y1="172" x2="270" y2="172"/>
    <line x1="368" y1="172" x2="394" y2="172"/>
    <line x1="492" y1="172" x2="518" y2="172"/>
    <line x1="616" y1="172" x2="642" y2="172"/>
    <line x1="740" y1="172" x2="766" y2="172"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a5570"/>
    </marker>
  </defs>

  <!-- connecting orchestration to boxes -->
  <g stroke="#4a57c9" stroke-width="1" stroke-dasharray="3 3" opacity="0.5">
    <line x1="320" y1="84" x2="320" y2="150"/>
    <line x1="444" y1="84" x2="444" y2="150"/>
    <line x1="568" y1="84" x2="568" y2="150"/>
    <line x1="692" y1="84" x2="692" y2="150"/>
  </g>

  <text x="430" y="250" font-family="ui-monospace, monospace" font-size="12" fill="#7d8590" text-anchor="middle">a cascade: latency adds up, errors propagate downstream</text>
</svg>
